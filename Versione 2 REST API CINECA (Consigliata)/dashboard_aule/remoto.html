<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Aule - UNIPV</title>
    
    <script>
        const CONFIG_APP = {
            titoloSede: "Impegni Aule",
            urlLogo: "/logo.png", // Lascia vuoto ("") per nasconderlo
            intervalloAggiornamento: 5000,
            messaggioNessunaLezione: "Nessun impegno attivo programmato per la giornata.",
            messaggioErroreRete: "Connessione persa col Server API.",
            // Impostazioni per il carosello di locandine
            pausaTraCaroselli: 180000, // Pausa tra un carosello di locandine e l'altro in millisecondi (di base 3 minuti)
            esposizioneLocandina: 15000, // Durata di esposizione di ogni locandina in millisecondi (di base 15 secondi)
            // LINK MENU A SCOMPARSA - cambiare il urlCalendario con il link del calendario pubblico di U-Planner della propria sede
            urlCalendario: "https://unipv.prod.up.cineca.it/calendarioPubblico/linkCalendarioId=5e3d320d8409120018939b0a",
            urlRepo: "https://github.com/VOriti/Kiosk4Uplanner", // Link al repository GitHub del progetto, lasciare invariato per licenza e aggiornamenti
            urlLicenza: "https://creativecommons.org/licenses/by-nc-sa/4.0/deed.it", // Link alla licenza Creative Commons BY-NC-SA 4.0, lasciare invariato per rispettare la licenza Share-Alike
            autore: "Vincenzo Oriti",
            emailAutore: "vincenzo.oriti@unipv.it"
        };
    </script>

<style>
    :root {
        --colore-sfondo: #0d1117;          
        --colore-scheda: #161b22;          
        --colore-testo-primario: #c9d1d9;  
        --colore-testo-secondario: #8b949e;
        --accento-titolo: #58a6ff;         
        --accento-orologio: #f2cc60;       
        --bordo-in-corso: #238636;         
        --bordo-futuro: #58a6ff;           
        --bordo-offline: #da3633;          
    }

body { 
        background-color: var(--colore-sfondo); color: var(--colore-testo-primario); 
        font-family: system-ui, -apple-system, sans-serif; 
        margin: 0; 
        padding: 15px; /* Rimpicciolito da 25px a 15px */
        box-sizing: border-box;
        height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

#banner-wrapper { margin-bottom: 10px !important; }
    #banner-wrapper img { max-height: 10vh !important; } /* Logo leggermente più compatto */
    
    .header { 
        display: flex; justify-content: space-between; align-items: center; 
        border-bottom: 2px solid #30363d; 
        padding-bottom: 10px; /* Rimpicciolito da 15px */
        margin-bottom: 15px; /* Rimpicciolito da 25px */
    }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .header-left h1 { color: var(--accento-titolo); margin: 0; font-size: 1.8rem; }
    .orologio { font-size: 2rem; color: var(--accento-orologio); font-weight: bold; }

    #dashboard { flex-grow: 1; min-height: 0; display: flex; flex-direction: column; }
    .layout-colonne { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; flex-grow: 1; min-height: 0; overflow: hidden; }
    
    /* MODIFICA: Qui forziamo la colonna a non scrollare e a comprimere i figli */
    .colonna-scroll { 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
        overflow: hidden; 
        height: 100%; 
    }

    .titolo-colonna {
        font-size: 1.3rem; color: var(--colore-testo-secondario); border-bottom: 2px solid #30363d; 
        padding-bottom: 8px; margin-top: 0; margin-bottom: 5px; text-transform: uppercase;
        flex-shrink: 0; /* Il titolo non deve rimpicciolirsi */
    }

.card { 
        background: var(--colore-scheda); border-left: 5px solid var(--bordo-futuro); 
        padding: 6px 12px;
        border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        display: flex; flex-direction: column; 
        gap: 2px; 
        flex-shrink: 1; 
        min-height: 35px; 
        overflow: hidden;
        min-width: 0; /* Permette alla card intera di restringersi */
    }
    
    .card.in-corso { border-left-color: var(--bordo-in-corso); }
    
    /* Riga 1: Alta priorità. Non si restringe mai (flex-shrink: 0) */
    .card-header { 
        display: flex; justify-content: space-between; align-items: center; gap: 10px; 
        flex-shrink: 0; 
        min-width: 0; /* Permette all'header di restringersi */
    }
    
    /* Riga 2: Bassa priorità. Se lo schermo è pieno, collassa (flex-shrink: 10) */
    .card-footer { 
        display: flex; justify-content: space-between; align-items: center; gap: 10px;
        flex-shrink: 10; 
        min-height: 0; 
        overflow: hidden;
        min-width: 0; /* Permette al footer di restringersi */
    }

    .titolo { 
        font-size: 1.1rem; font-weight: 600; line-height: 1.2; color: #e6edf3; 
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
        flex: 1; /* Occupa tutto lo spazio a sinistra */
        min-width: 0; /* Permette alla card di restringersi e usare i puntini (...) */
    }
    
    .docente { 
        color: var(--colore-testo-secondario); font-size: 0.85rem; 
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
        flex: 1; 
        min-width: 0; /*  Permette alla card di restringersi e usare i puntini (...) */
    }
    
    .aula { 
        font-size: 0.9rem; background: #21262d; padding: 2px 8px; border-radius: 15px; 
        color: var(--accento-orologio); font-weight: bold; 
        flex-shrink: 0; /* L'aula non deve mai venire troncata */
        white-space: nowrap; 
    }
    
    .orario { 
        font-size: 0.95rem; font-weight: bold; color: var(--colore-testo-primario); 
        flex-shrink: 0; white-space: nowrap; 
    }
    .stato-sistema { text-align: center; margin-top: 50px; font-size: 1.3rem; color: var(--colore-testo-secondario); font-style: italic; }
    .offline { color: var(--bordo-offline); font-weight: bold; font-style: normal; }
    
    .card.cancellato { border-left-color: var(--bordo-offline); opacity: 0.85; }
    .badge-avviso { 
            display: inline-block; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.70rem; /* Leggermente più piccolo */
            font-weight: bold; 
            text-transform: uppercase; 
            width: fit-content; 
            align-self: flex-end; /* Allinea il badge a destra! */
            margin-bottom: -2px; /* Lo avvicina al titolo per salvare spazio */
        }
    .badge-rosso { background-color: var(--bordo-offline); color: white; }
    .badge-giallo { background-color: #d29922; color: #0d1117; }
    .testo-barrato { text-decoration: line-through; opacity: 0.5; }

    #kiosk-adv {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000;
        z-index: 9999; display: none; opacity: 0; transition: opacity 1.5s ease-in-out;
        justify-content: center; align-items: center; gap: 40px; padding: 40px; box-sizing: border-box;
    }

    /* MENU FLUTTUANTE A SCOMPARSA */
    #info-badge {
        position: fixed;
        bottom: 25px;
        right: 0;
        background: rgba(22, 27, 34, 0.95);
        backdrop-filter: blur(5px);
        border: 1px solid #30363d;
        border-right: none;
        border-radius: 30px 0 0 30px;
        display: flex;
        align-items: center;
        height: 42px;
        padding: 0 15px 0 10px;
        color: var(--colore-testo-secondario);
        z-index: 9999;
        box-shadow: -3px 0 10px rgba(0,0,0,0.4);

        transform: translateX(calc(100% - 32px)); 
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    #info-badge:hover {
        transform: translateX(0); 
    }
    
.badge-icona {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        cursor: pointer; /* Mostra la manina per far capire che è cliccabile */
    }
    
    /* Animazione rotazione freccia */
    .badge-icona svg {
        transition: transform 0.3s ease;
    }
    
    /* Apre il cassetto con l'hover (su PC) o con la classe 'aperto' (su Mobile) */
    #info-badge:hover,
    #info-badge.aperto {
        transform: translateX(0); 
    }
    
    /* Ribalta la freccia quando il cassetto è aperto */
    #info-badge:hover .badge-icona svg,
    #info-badge.aperto .badge-icona svg {
        transform: rotate(180deg); 
    }
    
    #info-badge:hover .badge-contenuto,
    #info-badge.aperto .badge-contenuto {
        opacity: 1; 
        transition-delay: 0.15s; 
    }

.badge-contenuto a {
        position: relative; 
        color: var(--colore-testo-secondario);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
    }
    .badge-contenuto a:hover { 
        color: var(--colore-testo-primario); 
    }
    .badge-contenuto svg { width: 15px; height: 15px; }

    .badge-contenuto a::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 120%;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 10px;
        background-color: var(--colore-testo-primario);
        color: var(--colore-sfondo);
        font-size: 0.75rem;
        font-weight: normal;
        white-space: nowrap;
        border-radius: 4px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        opacity: 0;
        visibility: hidden;
        z-index: 10000;
        pointer-events: none;
    }

    .badge-contenuto a::before {
        content: '';
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-width: 5px;
        border-style: solid;
        border-color: var(--colore-testo-primario) transparent transparent transparent;
        opacity: 0;
        visibility: hidden;
        z-index: 10000;
        pointer-events: none;
    }

    #link-autore::after {
        left: auto;
        right: 0; 
        transform: none;
    }
    #link-autore::before {
        left: auto;
        right: 35px; 
        transform: none;
    }

    .badge-contenuto a:hover::after,
    .badge-contenuto a:hover::before {
        opacity: 1;
        visibility: visible;
        transition: opacity 0.05s ease-in;
    }

/* =========================================
OTTIMIZZAZIONI PER SMARTPHONE E TABLET
========================================= */
    @media (max-width: 768px) {
        body { 
            height: auto; 
            min-height: 100vh; 
            overflow-y: auto; 
            overflow-x: hidden; 
        }
        #dashboard { height: auto; }
        
        .layout-colonne { 
            grid-template-columns: minmax(0, 1fr); 
            gap: 20px; 
            overflow: visible; 
        }
        
        .colonna-scroll { 
            height: auto; 
            overflow: visible; 
            min-width: 0; 
            max-width: 100%;
        }
        
        .card { 
            flex-shrink: 0; 
            max-width: 100%;
            box-sizing: border-box;
        }

/* --- NUOVO MENU MOBILE A COMPARSA VERTICALE --- */
        #info-badge {
            height: auto;
            max-height: 42px; /* DA CHIUSO: Torna compatto come un bottoncino */
            padding: 0 15px 0 10px;
            border-radius: 30px 0 0 30px;
            max-width: 85vw;
            align-items: center;
            overflow: hidden;
            /* Animazione fluida sia in orizzontale (uscita) che in verticale (ingrandimento) */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), max-height 0.4s ease, padding 0.4s ease, border-radius 0.3s ease;
        }

        /* DISATTIVA L'HOVER NATIVO SU MOBILE */
        #info-badge:hover {
            transform: translateX(calc(100% - 32px));
        }
        #info-badge:hover .badge-icona svg {
            transform: none; /* Blocca rotazioni a vuoto */
        }

        /* STATO APERTO (Click) */
        #info-badge.aperto, #info-badge.aperto:hover {
            transform: translateX(0);
            max-height: 600px; 
            padding: 15px 20px 15px 10px;
            border-radius: 20px 0 0 20px;
            align-items: center; /* RIPORTA LA FRECCIA PERFETTAMENTE AL CENTRO */
        }

        /* ROTAZIONE FRECCIA ISTANTANEA */
        .badge-icona svg {
            transition: transform 0.25s ease-out; /* Scattante, nessun ritardo in chiusura! */
        }
        #info-badge.aperto .badge-icona svg, #info-badge.aperto:hover .badge-icona svg {
            transform: rotate(180deg);
        }

        /* GESTIONE APPARIZIONE TESTI */
        .badge-contenuto {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            margin-left: 10px;
            white-space: normal;
            opacity: 0;
            transition: opacity 0.15s ease-out; /* Sparisce istantaneamente quando chiudi */
        }
        #info-badge.aperto .badge-contenuto {
            opacity: 1;
            transition-delay: 0.2s; /* Appare in ritardo solo all'apertura, per dare tempo al pannello di srotolarsi */
        }

        .badge-contenuto span[style*="opacity:0.3"] {
            display: none !important;
        }

        .badge-contenuto a {
            font-size: 0.95rem; 
            padding: 5px 0;
            flex-wrap: wrap; /* Permette ai sottotitoli di andare a capo */
        }

        /* TRASFORMA LA NUVOLETTA IN TESTO DESCRITTIVO INLINE */
        .badge-contenuto a::after {
            display: block !important;
            position: static !important;
            transform: none !important;
            background: transparent !important;
            color: var(--colore-testo-secondario) !important;
            padding: 4px 0 0 22px !important; /* Allineato col testo superiore */
            font-size: 0.75rem !important;
            white-space: normal !important;
            opacity: 1 !important;
            visibility: visible !important;
            box-shadow: none !important;
            width: 100%;
        }

        /* Nasconde solo il triangolino inutile */
        .badge-contenuto a::before {
            display: none !important;
        }
    }
</style>
</head>
<body>

    <div id="kiosk-adv"></div>

    <div id="banner-wrapper" style="width:100%; text-align:center; margin-bottom:25px; display:none;">
        <img id="logo-sede" src="" alt="Banner Sede" style="width:100%; max-height:15vh; object-fit:contain; border-radius:8px;">
    </div>

    <div class="header">
        <div class="header-left">
            <h1 id="titolo-sede">Caricamento...</h1>
        </div>
        <div id="orologio" class="orologio">--:--</div>
    </div>
    
    <div id="dashboard">
        <div class="stato-sistema">Inizializzazione connessione col Server API...</div>
    </div>

    <script>
        document.getElementById('titolo-sede').innerText = CONFIG_APP.titoloSede;
        document.title = "Dashboard - " + CONFIG_APP.titoloSede;
        if (CONFIG_APP.urlLogo !== "") {
            document.getElementById('logo-sede').src = CONFIG_APP.urlLogo;
            document.getElementById('banner-wrapper').style.display = 'block';
        }

        setInterval(() => {
            document.getElementById('orologio').innerText = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

function generaCardHTML(impegno) {
            let classeStato = impegno.inCorso ? 'in-corso' : '';
            if (impegno.cancellato) classeStato += ' cancellato';
            
            let htmlAvviso = '';
            if (impegno.avviso) {
                const classeBadge = impegno.cancellato ? 'badge-rosso' : 'badge-giallo';
                htmlAvviso = `<div class="badge-avviso ${classeBadge}">${impegno.avviso}</div>`;
            }
            
            const stileTesto = impegno.cancellato ? 'testo-barrato' : '';

            return `
                <div class="card ${classeStato}">
                    ${htmlAvviso}
                    <div class="card-header">
                        <div class="titolo ${stileTesto}">${impegno.titolo}</div>
                        <div class="aula ${stileTesto}">${impegno.aula}</div>
                    </div>
                    <div class="card-footer">
                        <div class="docente ${stileTesto}">${impegno.docente}</div>
                        <div class="orario ${stileTesto}">${impegno.orario}</div>
                    </div>
                </div>
            `;
        }

        async function scaricaDatiServerLocale() {
            const dashboard = document.getElementById('dashboard');
            try {
                const risposta = await fetch('/dati.json');
                if (!risposta.ok) throw new Error('Errore HTTP');
                const datiAule = await risposta.json();

                if (!datiAule || datiAule.length === 0) {
                    dashboard.innerHTML = `<div class="stato-sistema">${CONFIG_APP.messaggioNessunaLezione}</div>`;
                    return;
                }

                let htmlInCorso = '', htmlFuturi = '';
                datiAule.forEach(imp => {
                    if (imp.inCorso) htmlInCorso += generaCardHTML(imp);
                    else htmlFuturi += generaCardHTML(imp);
                });

                if (!htmlInCorso) htmlInCorso = '<div style="font-size:1.1rem; color:#484f58; font-style:italic; padding:10px 0;">Nessuna lezione in questo momento</div>';
                if (!htmlFuturi) htmlFuturi = '<div style="font-size:1.1rem; color:#484f58; font-style:italic; padding:10px 0;">Nessuna lezione programmata</div>';

                const nuovoLayout = `
                    <div class="layout-colonne">
                        <div class="colonna-scroll">
                            <h2 class="titolo-colonna">In Corso</h2>
                            ${htmlInCorso}
                        </div>
                        <div class="colonna-scroll">
                            <h2 class="titolo-colonna">Prossimi Eventi</h2>
                            ${htmlFuturi}
                        </div>
                    </div>
                `;
                
                if (dashboard.innerHTML !== nuovoLayout) {
                    dashboard.innerHTML = nuovoLayout;
                }
            } catch(errore) {
                dashboard.innerHTML = `
                    <div class="stato-sistema offline">
                        <svg style="width:40px; height:40px; margin-bottom:10px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <br>${CONFIG_APP.messaggioErroreRete}
                    </div>
                `;
            }
        }
        
        scaricaDatiServerLocale();
        setInterval(scaricaDatiServerLocale, CONFIG_APP.intervalloAggiornamento);

        const advOverlay = document.getElementById('kiosk-adv');
        async function riproduciLocandine() {
            const isLandscape = window.innerWidth > window.innerHeight;
            const immaginiValide = [];
            
            for(let i = 1; i <= 4; i++) {
                const url = `/locandine/${i}.jpg?` + Date.now();
                const urlConfermata = await new Promise(resolve => {
                    let img = new Image(); img.onload = () => resolve(url); img.onerror = () => resolve(null); img.src = url;
                });
                if(urlConfermata) immaginiValide.push(urlConfermata);
            }
            if(immaginiValide.length === 0) return; 

            const gruppi = [];
            const imgPerGruppo = isLandscape ? 2 : 1;
            for(let i = 0; i < immaginiValide.length; i += imgPerGruppo) { 
                gruppi.push(immaginiValide.slice(i, i + imgPerGruppo)); 
            }

            advOverlay.style.display = 'flex';
            for(let i = 0; i < gruppi.length; i++) {
                advOverlay.innerHTML = gruppi[i].map(src => `<div style="flex:1; height:100%; width:100%; background-image:url('${src}'); background-size:contain; background-position:center; background-repeat:no-repeat;"></div>`).join('');
                await new Promise(r => setTimeout(r, 50));
                advOverlay.style.opacity = '1';
                await new Promise(r => setTimeout(r, CONFIG_APP.esposizioneLocandina));
                advOverlay.style.opacity = '0';
                await new Promise(r => setTimeout(r, 1500));
            }
            advOverlay.style.display = 'none'; 
            advOverlay.innerHTML = '';
        }
        
        setInterval(riproduciLocandine, CONFIG_APP.pausaTraCaroselli);
    </script>

<div id="info-badge">
    <div class="badge-icona">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </div>
    <div class="badge-contenuto">

                GitHub
            </a>
        <span style="opacity:0.3">|</span>
            <a id="link-licenza" href="#" target="_blank" data-tooltip="Rilasciato con licenza Creative Commons BY-NC-SA 4.0">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                CC BY-NC-SA 4.0
            </a>
