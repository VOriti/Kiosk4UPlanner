<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Aule - Remoto</title>
    
    <script>
        const CONFIG_APP = {
            titoloSede: "Impegni Aule",
            urlLogo: "/logo.png", // Lascia vuoto ("") per nasconderlo
            intervalloAggiornamento: 5000,
            messaggioNessunaLezione: "Nessun impegno attivo programmato per la giornata.",
            messaggioErroreRete: "Connessione persa con la centralina."
        };
    </script>

    <style>
        :root {
            --colore-sfondo: #0d1117;          
            --colore-scheda: #161b22;          
            --colore-testo-primario: #c9d1d9;  
            --colore-testo-secondario: #8b949e;
            --accento-titolo: #58a6ff;         
            --accento-orologio: #f2cc60;       
            --bordo-in-corso: #238636;         
            --bordo-futuro: #58a6ff;           
            --bordo-offline: #da3633;          
        }

        /* 1. BLOCCO DEL BODY AL 100% DELLO SCHERMO */
        body { 
            background-color: var(--colore-sfondo); color: var(--colore-testo-primario); 
            font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 25px; box-sizing: border-box;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Disabilita lo scroll generale della pagina */
        }

        /* 2. PROTEZIONE DEGLI ELEMENTI INTESTAZIONE DALLO SCHIACCIAMENTO */
        #banner-wrapper, .header { flex-shrink: 0; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #30363d; padding-bottom: 15px; margin-bottom: 25px; 
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-left h1 { color: var(--accento-titolo); margin: 0; font-size: 1.8rem; }
        .logo { height: 40px; width: auto; object-fit: contain; display: none; }
        .orologio { font-size: 2rem; color: var(--accento-orologio); font-weight: bold; }

        /* 3. IL CONTENITORE CHE PRENDE TUTTO LO SPAZIO RIMANENTE */
        #dashboard {
            flex-grow: 1;
            min-height: 0; /* Trucco fondamentale per attivare l'overflow nei figli flex */
            display: flex;
            flex-direction: column;
        }

        .layout-colonne {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            flex-grow: 1;
            min-height: 0;
        }
        
        /* 4. LE DUE COLONNE CON SCORRIMENTO INDIPENDENTE */
        .colonna-scroll {
            overflow-y: auto;
            padding-right: 15px;
            height: 100%;
        }

        /* Scrollbar personalizzata stile Dark Mode */
        .colonna-scroll::-webkit-scrollbar { width: 8px; }
        .colonna-scroll::-webkit-scrollbar-track { background: transparent; }
        .colonna-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .colonna-scroll::-webkit-scrollbar-thumb:hover { background: var(--colore-testo-secondario); }

        /* 5. TITOLI STICKY: restano incollati in alto mentre le card scorrono sotto */
        .titolo-colonna {
            font-size: 1.3rem; color: var(--colore-testo-secondario); border-bottom: 2px solid #30363d; 
            padding-bottom: 8px; margin-top: 0; margin-bottom: 15px; text-transform: uppercase;
            position: sticky; top: 0; background-color: var(--colore-sfondo); z-index: 10;
        }

        .card { 
            background: var(--colore-scheda); border-left: 5px solid var(--bordo-futuro); 
            padding: 12px 15px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 8px; transition: transform 0.2s ease; margin-bottom: 12px;
        }
        .card:hover { transform: translateY(-2px); }
        .card.in-corso { border-left-color: var(--bordo-in-corso); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .orario { font-size: 1.2rem; font-weight: bold; }
        .aula { font-size: 1rem; background: #21262d; padding: 3px 10px; border-radius: 15px; color: var(--accento-orologio); font-weight: bold; }
        
        .titolo { font-size: 1.2rem; font-weight: 600; line-height: 1.2; color: #e6edf3; }
        .docente { color: var(--colore-testo-secondario); font-size: 0.95rem; }

        .stato-sistema { text-align: center; margin-top: 50px; font-size: 1.3rem; color: var(--colore-testo-secondario); font-style: italic; grid-column: 1 / -1; }
        .offline { color: var(--bordo-offline); font-weight: bold; font-style: normal; }
        
        @media (max-width: 768px) {
            .layout-colonne { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="banner-wrapper" style="width:100%; text-align:center; margin-bottom:25px; display:none;">
        <img id="logo-sede" src="" alt="Banner Sede" style="width:100%; max-height:150px; object-fit:contain; border-radius:8px;">
    </div>

    <div class="header">
        <div class="header-left">
            <h1 id="titolo-sede">Caricamento...</h1>
        </div>
        <div id="orologio" class="orologio">--:--</div>
    </div>
    
    <div id="dashboard">
        <div class="stato-sistema">Inizializzazione connessione...</div>
    </div>

    <script>
        document.getElementById('titolo-sede').innerText = CONFIG_APP.titoloSede;
        document.title = "Dashboard - " + CONFIG_APP.titoloSede;
        
        if (CONFIG_APP.urlLogo !== "") {
            document.getElementById('logo-sede').src = CONFIG_APP.urlLogo;
            document.getElementById('banner-wrapper').style.display = 'block';
        }

        function aggiornaOrologio() {
            const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('orologio').innerText = ora;
        }
        setInterval(aggiornaOrologio, 1000);
        aggiornaOrologio();

        function generaCardHTML(impegno, inCorso) {
            const classeStato = inCorso ? 'in-corso' : '';
            return `
                <div class="card ${classeStato}">
                    <div class="card-header">
                        <div class="orario">${impegno.orario}</div>
                        <div class="aula">${impegno.aula}</div>
                    </div>
                    <div class="titolo">${impegno.titolo}</div>
                    <div class="docente">${impegno.docente}</div>
                </div>
            `;
        }

        async function scaricaDatiCentralina() {
            const dashboard = document.getElementById('dashboard');

            try {
                const risposta = await fetch('/dati.json');
                if (!risposta.ok) throw new Error('Rete non valida');
                const datiAule = await risposta.json();

                if (!datiAule || datiAule.length === 0) {
                    dashboard.innerHTML = `<div class="stato-sistema">${CONFIG_APP.messaggioNessunaLezione}</div>`;
                    return;
                }

                let htmlInCorso = '';
                let htmlFuturi = '';

                datiAule.forEach(imp => {
                    if (imp.inCorso) htmlInCorso += generaCardHTML(imp, true);
                    else htmlFuturi += generaCardHTML(imp, false);
                });

                if (!htmlInCorso) htmlInCorso = '<div style="font-size:1.1rem; color:#484f58; font-style:italic; padding:10px 0;">Nessuna lezione in questo momento</div>';
                if (!htmlFuturi) htmlFuturi = '<div style="font-size:1.1rem; color:#484f58; font-style:italic; padding:10px 0;">Nessuna lezione programmata</div>';

                // Applichiamo la classe "colonna-scroll" ai div per renderli indipendenti
                const nuovoLayout = `
                    <div class="layout-colonne">
                        <div class="colonna-scroll">
                            <h2 class="titolo-colonna">In Corso</h2>
                            ${htmlInCorso}
                        </div>
                        <div class="colonna-scroll">
                            <h2 class="titolo-colonna">Prossimi Eventi</h2>
                            ${htmlFuturi}
                        </div>
                    </div>
                `;
                
                if (dashboard.innerHTML !== nuovoLayout) {
                    dashboard.innerHTML = nuovoLayout;
                }

            } catch(errore) {
                dashboard.innerHTML = `
                    <div class="stato-sistema offline">
                        <svg style="width:40px; height:40px; margin-bottom:10px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <br>${CONFIG_APP.messaggioErroreRete}
                    </div>
                `;
            }
        }
        
        scaricaDatiCentralina();
        setInterval(scaricaDatiCentralina, CONFIG_APP.intervalloAggiornamento);
    </script>
</body>
</html>
